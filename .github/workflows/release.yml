# Build + push the CTFd image (multi-arch), publish deploy/ as a Flux OCI artifact, and
# cosign-sign both (keyless / GitHub OIDC). Prod pulls amd64, the local demo pulls arm64.
#
# Repo secrets/vars required:
#   secrets.DOCKERHUB_USERNAME, secrets.DOCKERHUB_TOKEN   (Docker Hub push creds)
#   vars.DOCKERHUB_ORG   (optional; defaults to "explabs")
# .sourceignore keeps the SOPS age key + bin/ OUT of the published artifact.
name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # cosign keyless signing

env:
  ORG: ${{ vars.DOCKERHUB_ORG || 'explabs' }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.ORG }}/ctf-school-ctfd
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (trivy, report-only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker.io/${{ env.ORG }}/ctf-school-ctfd@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '0'            # set to '1' + severity: CRITICAL,HIGH to gate releases

      - uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: cosign sign --yes docker.io/${{ env.ORG }}/ctf-school-ctfd@${{ steps.build.outputs.digest }}

      - name: Install Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Publish + sign deploy OCI artifact
        run: |
          set -euo pipefail
          TAG="latest"; [ "${{ github.ref_type }}" = "tag" ] && TAG="${{ github.ref_name }}"
          for t in "$TAG" latest; do
            digest=$(flux push artifact "oci://docker.io/${ORG}/ctf-school-deploy:${t}" \
              --path=. \
              --source="${{ github.server_url }}/${{ github.repository }}" \
              --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
              --output json | jq -r '.digest')
            cosign sign --yes "docker.io/${ORG}/ctf-school-deploy@${digest}"
          done
