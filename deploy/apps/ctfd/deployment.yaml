apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctfd
  namespace: ctfd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ctfd
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ctfd
    spec:
      serviceAccountName: ctfd
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: ctfd
          image: ${CTFD_IMAGE}:${IMAGE_TAG}   # filled by Flux from cluster-config
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ctfd-secret
                  key: secret-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ctfd-secret
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ctfd-secret
                  key: redis-url
            - name: WORKERS
              value: "2"
            # gunicorn's default keep-alive is 2s, far shorter than how long a
            # proxy pools upstream connections. That mismatch makes gunicorn close
            # pooled connections out from under Envoy → ERR_EMPTY_RESPONSE. Keep
            # them alive longer than Envoy's connectionIdleTimeout (30s) so Envoy
            # is always the side that closes, cleanly. (gunicorn reads this env.)
            - name: GUNICORN_CMD_ARGS
              value: "--keep-alive=75"
            - name: ACCESS_LOG
              value: "-"
            - name: ERROR_LOG
              value: "-"
            - name: REVERSE_PROXY
              value: "true"
            - name: LOG_FOLDER
              value: "/var/log/CTFd"
            - name: UPLOAD_PROVIDER
              value: "filesystem"
            # HMAC key for flag derivation — from the SAME `ctf-school-secret`
            # the controller uses (so flags match). Dev value in kind comes from
            # clusters/kind/secrets.yaml; prod supplies it externally.
            - name: CTF_SCHOOL_SECRET
              valueFrom:
                secretKeyRef:
                  name: ctf-school-secret
                  key: secret
            # Bearer token that guards the /lab-metrics anti-cheat exporter.
            - name: CTF_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ctf-school-secret
                  key: metrics_token
            # Platform flag format / domain / scheme — set ONCE per cluster in the
            # cluster-config ConfigMap and substituted by Flux. Authors never set
            # the flag format; the controller reads the same CTF_FLAG_FORMAT.
            - name: CTF_FLAG_FORMAT
              value: "${CTF_FLAG_FORMAT}"
            - name: CTF_DOMAIN
              value: "${CTF_DOMAIN}"
            - name: CTF_SCHEME
              value: "${CTF_SCHEME}"
            # Max concurrently running labs per team (user in non-team mode)
            - name: MAX_CONCURRENT_LABS
              value: "2"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
