apiVersion: v1
kind: ServiceAccount
metadata:
  name: ctfd
  namespace: ctfd
---
# CTFd plugin создаёт/читает/удаляет LabSession через in-cluster K8s API
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ctfd-labsession-manager
rules:
  - apiGroups: ["core.ctf.school"]
    resources: ["labsessions"]
    # patch = fast in-place restart (annotation bump); no full teardown.
    verbs: ["get", "list", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ctfd-labsession-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ctfd-labsession-manager
subjects:
  - kind: ServiceAccount
    name: ctfd
    namespace: ctfd
