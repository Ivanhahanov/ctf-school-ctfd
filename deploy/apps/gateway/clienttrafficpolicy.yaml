# Preserve the real client IP. Envoy reads X-Forwarded-For (trusting 1 hop: the
# LoadBalancer in front), so CTFd — which already runs with REVERSE_PROXY=true —
# records the player's IP on every submission. The anti-cheat exporter surfaces it
# as evidence (datacenter IPs / shared IPs across a team).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: ctfd-client-ip
  namespace: ctfd
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ctfd
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
