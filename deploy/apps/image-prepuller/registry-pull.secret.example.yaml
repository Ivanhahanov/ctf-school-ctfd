# TEMPLATE — do NOT apply as-is and do NOT commit real values in plaintext.
#
# daemonset-challenges.yaml pulls from registry.${CTF_DOMAIN}, which requires
# htpasswd auth even for pulls (see ../registry/deployment.yaml, REGISTRY_AUTH).
# imagePullSecrets needs an ACTUAL kubernetes.io/dockerconfigjson Secret — a plain
# key inside a generic Opaque secret (like ctf-school-secret's
# registry_dockerconfigjson) won't work there, that's exactly why the controller
# reshapes it into a dedicated Secret per session namespace instead of referencing
# ctf-school-secret directly. Same reshaping needed here, once, for this namespace.
#
# Reuse the SAME registry credentials you already provisioned for
# CTF_REGISTRY_PULLSECRET (see ../registry/README.md "Pulling into lab pods") —
# this is just that credential, in the shape imagePullSecrets requires, supplied to
# one more namespace via the same SOPS flow as registry-auth / ctf-school-secret.
#
#   AUTH=$(printf '%s:%s' "$USER" "$PASS" | base64)
#   DOCKERCFG=$(printf '{"auths":{"registry.%s":{"username":"%s","password":"%s","auth":"%s"}}}' \
#     "$CTF_DOMAIN" "$USER" "$PASS" "$AUTH")
apiVersion: v1
kind: Secret
metadata:
  name: registry-pull
  namespace: image-prepuller
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: REPLACE_WITH_DOCKERCFG_JSON_FROM_ABOVE
