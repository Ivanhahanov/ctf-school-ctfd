apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-anti-ai
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  anti-ai.json: |
    {
      "title": "CTF School — Anti-AI / Anti-Cheat",
      "uid": "ctf-anti-ai",
      "schemaVersion": 39,
      "tags": ["ctf-school", "security"],
      "time": {"from": "now-12h", "to": "now"},
      "refresh": "30s",
      "templating": {"list": [
        {"name": "datasource", "type": "datasource", "query": "prometheus", "current": {}, "hide": 0},
        {"name": "team", "type": "query", "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "query": "label_values(ctf_solved, team)", "includeAll": true, "multi": true, "current": {"text": "All", "value": "$__all"}}
      ]},
      "panels": [
        {"id": 1, "type": "row", "title": "Detection — leads to review (never auto-blocked)", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}},

        {"id": 2, "type": "stat", "title": "Solved without working here (<2 min hands-on)", "gridPos": {"h": 4, "w": 5, "x": 0, "y": 1},
         "description": "Correct flag with under 2 minutes of real interaction in the guarded workspace — strongest signal of solving outside.",
         "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}},
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"expr": "count(team_labspace:solved_low_engagement == 1) or vector(0)", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]},
        {"id": 3, "type": "stat", "title": "Solved with 0 wrong attempts", "gridPos": {"h": 4, "w": 5, "x": 5, "y": 1},
         "description": "No trial-and-error before a correct flag — the answer arrived fully formed.",
         "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}]}}},
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"expr": "count((ctf_solved == 1) and on (team, labspace) (ctf_wrong_attempts == 0)) or vector(0)", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]},
        {"id": 4, "type": "stat", "title": "Flag-sharing submitters", "gridPos": {"h": 4, "w": 5, "x": 10, "y": 1},
         "description": "Submitted a flag that belongs to ANOTHER team (per-team HMAC flags make this unambiguous).",
         "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}},
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"expr": "count(ctf_foreign_flag_submits > 0) or vector(0)", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]},
        {"id": 5, "type": "stat", "title": "Scripted (API) submitters", "gridPos": {"h": 4, "w": 4, "x": 15, "y": 1},
         "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}]}}},
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"expr": "count(ctf_submit_via_api > 0) or vector(0)", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]},
        {"id": 6, "type": "stat", "title": "Automation fingerprinted", "gridPos": {"h": 4, "w": 5, "x": 19, "y": 1},
         "description": "Guard saw webdriver/headless on the noVNC client.",
         "fieldConfig": {"defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}]}}},
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"expr": "count(workspace_guard_webdriver == 1) or vector(0)", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]},

        {"id": 10, "type": "table", "title": "Suspicion board — per team × challenge (sort any column)", "gridPos": {"h": 11, "w": 24, "x": 0, "y": 5},
         "description": "Every signal side by side. No single number condemns; cross-read low engagement + 0 wrong + fast solve + foreign flag + API + datacenter IP.",
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "fieldConfig": {"defaults": {"custom": {"filterable": true}}, "overrides": [
           {"matcher": {"id": "byName", "options": "engaged_seconds"}, "properties": [{"id": "custom.cellOptions", "value": {"type": "color-background"}}, {"id": "thresholds", "value": {"steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 120}, {"color": "green", "value": 600}]}}]},
           {"matcher": {"id": "byName", "options": "wrong_attempts"}, "properties": [{"id": "custom.cellOptions", "value": {"type": "color-background"}}, {"id": "thresholds", "value": {"steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 3}]}}]},
           {"matcher": {"id": "byName", "options": "foreign_flags"}, "properties": [{"id": "custom.cellOptions", "value": {"type": "color-background"}}, {"id": "thresholds", "value": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}]}
         ]},
         "targets": [
           {"refId": "A", "expr": "ctf_solved", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "B", "expr": "team_labspace:engaged_seconds", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "C", "expr": "ctf_solve_seconds", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "D", "expr": "ctf_wrong_attempts", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "E", "expr": "ctf_min_wrong_editdistance", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "F", "expr": "ctf_foreign_flag_submits", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "G", "expr": "ctf_submit_via_api", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "H", "expr": "ctf_distinct_submit_ips", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "I", "expr": "ctf_lab_restarts", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "J", "expr": "team_labspace:anomaly_score", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}}
         ],
         "transformations": [
           {"id": "merge", "options": {}},
           {"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "job": true, "instance": true, "sid": true}, "renameByName": {
             "owner": "team", "labspace": "challenge",
             "Value #A": "solved", "Value #B": "engaged_seconds", "Value #C": "solve_seconds",
             "Value #D": "wrong_attempts", "Value #E": "min_editdist", "Value #F": "foreign_flags",
             "Value #G": "via_api", "Value #H": "distinct_ips", "Value #I": "restarts", "Value #J": "anomaly"}}}
         ]},

        {"id": 20, "type": "row", "title": "Evidence — the proof behind a flag", "gridPos": {"h": 1, "w": 24, "x": 0, "y": 16}},

        {"id": 21, "type": "table", "title": "Client fingerprint (last IP + User-Agent per submission)", "gridPos": {"h": 9, "w": 12, "x": 0, "y": 17},
         "description": "Datacenter IPs (AWS/GCP), python-requests / headless UAs, or one IP across a whole team are hard proof for a report.",
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"refId": "A", "expr": "ctf_client_info{team=~\"$team\"}", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}}],
         "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "job": true, "instance": true, "team": true, "Value": true}, "renameByName": {"owner": "team", "labspace": "challenge"}}}]},

        {"id": 22, "type": "table", "title": "Flag sharing — who submitted whose flag", "gridPos": {"h": 9, "w": 12, "x": 12, "y": 17},
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"refId": "A", "expr": "ctf_foreign_flag_submits > 0", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}}],
         "transformations": [{"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "job": true, "instance": true, "team": true}, "renameByName": {"owner": "team", "labspace": "challenge", "Value": "foreign_submits"}}}]},

        {"id": 23, "type": "table", "title": "Engagement vs solve — solved challenges, hands-on time", "gridPos": {"h": 9, "w": 12, "x": 0, "y": 26},
         "description": "Solved rows sorted by engaged_seconds; the lowest are the ones to look at first.",
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "fieldConfig": {"defaults": {}, "overrides": [
           {"matcher": {"id": "byName", "options": "engaged_seconds"}, "properties": [{"id": "custom.cellOptions", "value": {"type": "color-background"}}, {"id": "thresholds", "value": {"steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 120}, {"color": "green", "value": 600}]}}]}
         ]},
         "targets": [
           {"refId": "A", "expr": "team_labspace:engaged_seconds and on (team, labspace) (ctf_solved == 1)", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}},
           {"refId": "B", "expr": "ctf_solve_seconds", "format": "table", "instant": true, "datasource": {"type": "prometheus", "uid": "${datasource}"}}
         ],
         "transformations": [
           {"id": "merge", "options": {}},
           {"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "job": true, "instance": true, "sid": true}, "renameByName": {"owner": "team", "labspace": "challenge", "Value #A": "engaged_seconds", "Value #B": "solve_seconds"}}}
         ]},

        {"id": 24, "type": "timeseries", "title": "Robotic (superhuman-timing) events /s by team", "gridPos": {"h": 9, "w": 12, "x": 12, "y": 26},
         "datasource": {"type": "prometheus", "uid": "${datasource}"},
         "targets": [{"expr": "sum by (team) (rate(workspace_guard_robotic_events_total{team=~\"$team\"}[5m]))", "legendFormat": "{{team}}", "datasource": {"type": "prometheus", "uid": "${datasource}"}}]}
      ]
    }
