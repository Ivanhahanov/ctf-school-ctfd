# VictoriaLogs datasource, provisioned via the Grafana datasource sidecar (it
# watches ConfigMaps labelled grafana_datasource=1). This is the kustomize-applied
# way — no chart values / publish needed. The `victoriametrics-logs-datasource`
# plugin must be present in Grafana (see monitoring/README: sideload it, since the
# cluster can't always reach grafana.com under a VPN).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-victorialogs
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  victorialogs.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        uid: victorialogs
        access: proxy
        url: http://vl-victoria-logs-single-server.monitoring.svc:9428
        jsonData:
          maxLines: 1000
        editable: false
