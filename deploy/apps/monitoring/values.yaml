# Helm values for victoria-metrics-k8s-stack (vm/victoria-metrics-k8s-stack).
# Provides VMSingle (storage) + vmagent (scrape) + Grafana + node-exporter +
# kube-state-metrics + the VictoriaMetrics operator, plus built-in cluster &
# resource dashboards. Our custom bits:
#   - kube-state-metrics reads the LabSession CRD → lab inventory metrics
#   - Grafana dashboard sidecar picks up our ConfigMap dashboards
#   - guards are scraped via a VMPodScrape (see vmpodscrape-guard.yaml)

victoria-metrics-operator:
  enabled: true

vmsingle:
  spec:
    retentionPeriod: "7d"        # plenty for a dev/CTF cluster
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

# vmagent scrapes node-exporter, kube-state-metrics, kubelet/cAdvisor, the
# operator-managed scrape CRs (incl. our VMPodScrape for the guards), etc.
vmagent:
  enabled: true

alertmanager:
  enabled: false                 # not needed yet
vmalert:
  enabled: false

defaultDashboards:
  enabled: true                  # built-in k8s cluster/resource dashboards

grafana:
  enabled: true
  # # Admin credentials come from a Secret (not a plaintext value in git). The Secret
  # # `grafana-admin` (keys admin-user/admin-password) is supplied per-cluster via SOPS
  # # (clusters/<env>/secrets). kind = a known dev password; cloud = a strong one.
  # admin:
  #   existingSecret: grafana-admin
  #   userKey: admin-user
  #   passwordKey: admin-password
  #
  # VictoriaLogs datasource plugin (for the anti-cheat evidence/keystroke panels).
  # The declarative, chart-native way — Grafana installs it from grafana.com at boot.
  # Needs egress to grafana.com; that's the normal case and the DevOps best practice.
  #   AIR-GAPPED / no-egress clusters: don't use this list (a failed download crashes
  #   the pod). Instead pre-stage the plugin — e.g. an initContainer that copies it
  #   from a pre-baked image into the plugins dir. See deploy/README.
  # The datasource itself is provisioned by the `grafana_datasource`-labelled
  # ConfigMap (grafana-datasource-victorialogs.yaml), applied via kustomize.
  plugins:
    - victoriametrics-logs-datasource
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard   # our dashboard ConfigMaps carry this label
      labelValue: "1"
      searchNamespace: ALL
  grafana.ini:
    server:
      root_url: "https://grafana.${CTF_DOMAIN}"
    # LOGIN REQUIRED. Grafana is exposed via the gateway and holds player IPs +
    # anti-cheat data, so anonymous access is OFF — everyone authenticates.
    auth.anonymous:
      enabled: true

kube-state-metrics:
  enabled: true
  # Let KSM read our CRD so we get lab-inventory metrics with no controller code.
  rbac:
    extraRules:
      - apiGroups: ["core.ctf.school"]
        resources: ["labsessions"]
        verbs: ["list", "watch"]
  # Emit `labsession_info{name,team,labspace,phase} 1` per LabSession.
  customResourceState:
    enabled: true
    config:
      spec:
        resources:
          - groupVersionKind:
              group: "core.ctf.school"
              version: "v1"
              kind: "LabSession"
            metricNamePrefix: "labsession"
            labelsFromPath:
              name: [metadata, name]
            metrics:
              - name: "info"
                help: "LabSession inventory by phase/team/labspace."
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      phase: [status, phase]
                      team: [spec, userId]
                      labspace: [spec, labSpaceRef]
                      owner: [metadata, annotations, "ctf.school/owner"]
