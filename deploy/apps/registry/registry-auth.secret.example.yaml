# TEMPLATE — do NOT apply as-is and do NOT commit real values in plaintext.
# The registry Deployment mounts this Secret (htpasswd for auth, http_secret for the
# registry's upload-token HMAC). Supply it per cluster via the SOPS `secrets` flow,
# exactly like ctf-school-secret. See README.md for the one-liners.
#
#   htpasswd (bcrypt, registry only accepts -B):
#     docker run --rm --entrypoint htpasswd httpd:2 -Bbn <user> <password>
#   http_secret:
#     openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: registry-auth
  namespace: registry
type: Opaque
stringData:
  # One or more "user:$2y$..." lines.
  htpasswd: |
    ctf-ci:$2y$10$REPLACE_WITH_A_REAL_BCRYPT_HASH
  http_secret: REPLACE_WITH_openssl_rand_hex_32
