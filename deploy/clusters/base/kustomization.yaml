# Shared platform layer referenced by every cluster overlay: the cluster-agnostic
# Flux Kustomizations (sync.yaml). The OCI sources (flux-system/controller/challenges)
# and the root Kustomization live in each overlay's flux-system.yaml, because their
# registry differs per cluster and `make`/CI apply that seed imperatively.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - sync.yaml
