# Sibling-repo Flux sources, shared by every cluster (kind + cloud) — read-only.
# `flux-system` (this ctfd repo) is defined per-cluster in flux-system.yaml.
# Private repos → add `secretRef` + a read-only deploy key (see deploy/README.md).
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: controller
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Ivanhahanov/ctf-school-controller
  ref:
    branch: main
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: challenges
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Ivanhahanov/ctf-school-challenges
  ref:
    branch: main
