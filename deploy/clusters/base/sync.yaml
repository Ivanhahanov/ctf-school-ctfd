# Platform Kustomizations — SHARED by every cluster (kind + cloud).
#
# This is the single source of truth for HOW the platform is deployed. A cluster
# overlay (clusters/kind, clusters/cloud) adds only:
#   * flux-system.yaml  — the repo source + root Kustomization (its own path)
#   * cluster-config.yaml — a `cluster-config` ConfigMap with that cluster's VALUES
#   * (kind only) a dev `ctf-school-secret` Secret; prod supplies it externally
#
# So kind and cloud run the IDENTICAL Flux mechanism: ${VAR} placeholders in the
# manifests, filled by Flux `postBuild.substituteFrom` the `cluster-config`
# ConfigMap. The only differences between clusters are the values in that map
# (domain, scheme, image registry/tag) — never the deployment approach.
#
# Paths are relative to each OCIRepository artifact root:
#   flux-system → the ctfd repo       (./deploy/*)
#   controller  → the controller repo (./config/default)
# (challenges are script-loaded, not Flux-managed — see the note at the bottom.)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: infrastructure, namespace: flux-system }
spec:
  interval: 30m
  path: ./deploy/infrastructure
  prune: true
  wait: true
  sourceRef: { kind: OCIRepository, name: flux-system }
  postBuild:
    substituteFrom:
      - { kind: ConfigMap, name: cluster-config }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: data, namespace: flux-system }
spec:
  dependsOn: [{ name: infrastructure }]
  interval: 30m
  path: ./deploy/apps/mariadb
  prune: true
  sourceRef: { kind: OCIRepository, name: flux-system }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: cache, namespace: flux-system }
spec:
  dependsOn: [{ name: infrastructure }]
  interval: 30m
  path: ./deploy/apps/keydb
  prune: true
  sourceRef: { kind: OCIRepository, name: flux-system }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: ctfd, namespace: flux-system }
spec:
  dependsOn: [{ name: data }, { name: cache }]
  interval: 30m
  path: ./deploy/apps/ctfd
  prune: true
  sourceRef: { kind: OCIRepository, name: flux-system }
  postBuild:
    substituteFrom:
      - { kind: ConfigMap, name: cluster-config }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: gateway, namespace: flux-system }
spec:
  dependsOn: [{ name: infrastructure }, { name: ctfd }]
  interval: 30m
  path: ./deploy/apps/gateway
  prune: true
  sourceRef: { kind: OCIRepository, name: flux-system }
  postBuild:
    substituteFrom:
      - { kind: ConfigMap, name: cluster-config }
---
# Private task-image registry (challenge source). Needs the namespace (infrastructure)
# and the Gateway (its HTTPRoute attaches to the ctfd Gateway). The `registry-auth`
# Secret is applied by the `secrets` Kustomization; the registry pod waits for it.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: registry, namespace: flux-system }
spec:
  dependsOn: [{ name: infrastructure }, { name: gateway }]
  interval: 30m
  path: ./deploy/apps/registry
  prune: true
  sourceRef: { kind: OCIRepository, name: flux-system }
  postBuild:
    substituteFrom:
      - { kind: ConfigMap, name: cluster-config }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: monitoring-config, namespace: flux-system }
spec:
  dependsOn: [{ name: infrastructure }, { name: gateway }]
  interval: 30m
  path: ./deploy/apps/monitoring
  prune: true
  sourceRef: { kind: OCIRepository, name: flux-system }
  postBuild:
    substituteFrom:
      - { kind: ConfigMap, name: cluster-config }
---
# Controller — base (config/default) from its own repo; the deploy-time
# customization (image, env, args) is applied HERE so it is identical for every
# cluster. ${VAR} in the image/env are substituted by THIS Kustomization's
# postBuild (it runs on the rendered Deployment, after the patch is applied).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: { name: controller, namespace: flux-system }
spec:
  dependsOn: [{ name: infrastructure }]
  interval: 30m
  path: ./config/default
  prune: true
  sourceRef: { kind: OCIRepository, name: controller }
  images:
    - name: ctf.school/controller
      newName: "${CONTROLLER_IMAGE}"
      newTag: "${IMAGE_TAG}"
  patches:
    # Target by label, not name — Flux applies patches before the `controller-`
    # name prefix, so a name target would miss; the label is prefix-independent.
    - target: { kind: Deployment, labelSelector: control-plane=controller-manager }
      patch: |
        - op: add
          path: /spec/template/spec/containers/0/imagePullPolicy
          value: IfNotPresent
        - op: add
          path: /spec/template/spec/containers/0/env
          value:
            - { name: CTF_DOMAIN, value: "${CTF_DOMAIN}" }
            - { name: CTF_SCHEME, value: "${CTF_SCHEME}" }
            - { name: CTF_FLAG_FORMAT, value: "${CTF_FLAG_FORMAT}" }
            - { name: GUARD_IMAGE, value: "${GUARD_IMAGE}" }   # guard sidecar image, per-cluster registry
            # Split secrets (security review #1). CTF_SCHOOL_SECRET stays as the
            # migration fallback both sides honour; the controller uses CTF_FLAG_SECRET
            # to derive flags and CTF_JWT_SECRET as the guard sidecar's token key.
            - name: CTF_SCHOOL_SECRET
              valueFrom:
                secretKeyRef: { name: ctf-school-secret, key: secret }
            - name: CTF_FLAG_SECRET
              valueFrom:
                secretKeyRef: { name: ctf-school-secret, key: flag_secret }
            - name: CTF_JWT_SECRET
              valueFrom:
                secretKeyRef: { name: ctf-school-secret, key: jwt_secret }
            # Private task-registry pull creds (~/.docker/config.json). The controller
            # stamps this as a dockerconfigjson Secret + imagePullSecrets into every
            # session namespace so kubelet can pull private challenge images. Optional:
            # absent on kind/dev (images are kind-loaded / public) => feature stays off.
            - name: CTF_REGISTRY_PULLSECRET
              valueFrom:
                secretKeyRef: { name: ctf-school-secret, key: registry_dockerconfigjson, optional: true }
        - op: replace
          path: /spec/template/spec/containers/0/args
          value:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            - --metrics-secure=true
  postBuild:
    substituteFrom:
      - { kind: ConfigMap, name: cluster-config }
# NOTE: challenges are NOT reconciled by Flux — they're loaded on demand by a script
# (the llm-ctf-2026 Makefile: `make crds` / `make deploy-local`), because challenge
# sets come and go independently of the platform lifecycle.
