# Values for the CLOUD (prod) cluster. SAME mechanism as kind (clusters/base) —
# only these values differ. Flux fills the ${VAR} placeholders from here.
#
# The HMAC secret is NOT here (secrets don't belong in a ConfigMap). It ships as a
# SOPS-encrypted Secret in ./secrets/, decrypted in-cluster by the `secrets` Flux
# Kustomization. Bootstrap (loading the age key as `sops-age`) is in ./README.md.
apiVersion: v1
kind: ConfigMap
metadata: { name: cluster-config, namespace: flux-system }
data:
  CTF_DOMAIN: "ctf.example.com"                         # ← your real domain
  CTF_SCHEME: "https"
  CTF_FLAG_FORMAT: "CTF{%s}"
  # TLS: start on STAGING (validate DNS-01 + renewal without hitting prod rate limits),
  # then switch to letsencrypt-prod once staging issues cleanly.
  TLS_ISSUER: "letsencrypt-staging"
  ACME_EMAIL: "admin@ctf.example.com"                   # ← Let's Encrypt account email
  # Docker Hub org `explabs`, `ctf-school-` prefix (Docker Hub repos are flat).
  CONTROLLER_IMAGE: "docker.io/explabs/ctf-school-controller"
  CTFD_IMAGE: "docker.io/explabs/ctf-school-ctfd"
  GUARD_IMAGE: "docker.io/explabs/ctf-school-guard:v0.1.0"   # full ref
  IMAGE_TAG: "v0.1.0"
