# Values for the CLOUD (prod) cluster. SAME mechanism as kind (clusters/base) —
# only these values differ. Flux fills the ${VAR} placeholders from here.
#
# The HMAC secret is NOT here (secrets don't belong in a ConfigMap). It ships as a
# SOPS-encrypted Secret in ./secrets/, decrypted in-cluster by the `secrets` Flux
# Kustomization. Bootstrap (loading the age key as `sops-age`) is in ./README.md.
apiVersion: v1
kind: ConfigMap
metadata: { name: cluster-config, namespace: flux-system }
data:
  CTF_DOMAIN: "alfa.ctf.school"
  CTF_SCHEME: "https"
  CTF_FLAG_FORMAT: "CTF{%s}"
  # TLS: start on STAGING (validate DNS-01 + renewal without hitting prod rate limits),
  # then switch to letsencrypt-prod once staging issues cleanly.
  TLS_ISSUER: "letsencrypt-staging"
  ACME_EMAIL: "admin@ctf.example.com"                   # ← Let's Encrypt account email
  # Docker Hub org `explabs`, `ctf-school-` prefix (Docker Hub repos are flat).
  CONTROLLER_IMAGE: "docker.io/explabs/ctf-school-controller"
  CTFD_IMAGE: "docker.io/explabs/ctf-school-ctfd"
  # Image tags track the MOVING `latest` (same as kind) so ONE flow ships prod:
  #   make ci                # build + push images :latest
  #   make prod TAG=latest   # pull the latest manifests AND run the latest images
  # `TAG` (the OCI manifest artifact) and `IMAGE_TAG` (these container images) are now
  # the same moving tag — no v0.1.0/latest split to keep in sync.
  # TRADE-OFF (chosen for time-to-market): `latest` is MUTABLE — no immutable version
  # pinning, no clean rollback-by-tag, and cosign `verify` in flux-system.yaml stays
  # OFF. Re-pushing `latest` does NOT auto-rollout (same tag → same manifest); force it
  # with `kubectl -n ctfd rollout restart deploy/ctfd` (and the controller) after a
  # `make ci`. To pin an immutable release later, set these back to a version and deploy
  # with `make ci/prod TAG=v0.1.1`.
  GUARD_IMAGE: "docker.io/explabs/ctf-school-guard:latest"   # full ref
  IMAGE_TAG: "latest"
