# Root Flux sources for the cloud cluster — SAME OCI mechanism and SAME registry as
# kind (Docker Hub, docker.io/$DOCKERHUB_USER); prod just pins ${TAG} to an immutable
# digest/version. Applied by the deploy procedure (make/CI) with ${REGISTRY}/${TAG}
# filled in; keep ${OCI_INSECURE}=false. `flux create secret oci` if the repos are private.
#
# spec.verify (cosign KEYLESS) — Flux refuses to reconcile an artifact NOT signed by the
# expected GitHub Actions release workflow (closes the "push to Docker Hub → cluster-admin"
# supply-chain hole). Only on CLOUD: prod artifacts come from the signed CI workflows;
# kind/demo pulls locally-`make ci`-pushed UNSIGNED artifacts, so kind has no verify.
# The subject identity is the GitHub OWNER/REPO — update if the repos move to an org.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  url: oci://${REGISTRY}/ctf-school-deploy
  ref:
    tag: "${TAG}"
  insecure: ${OCI_INSECURE}
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token\\.actions\\.githubusercontent\\.com$"
        subject: "^https://github\\.com/Ivanhahanov/ctf-school-ctfd/\\.github/workflows/release\\.yml@refs/.+$"
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: controller
  namespace: flux-system
spec:
  interval: 1m
  url: oci://${REGISTRY}/ctf-school-controller-config
  ref:
    tag: "${TAG}"
  insecure: ${OCI_INSECURE}
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "^https://token\\.actions\\.githubusercontent\\.com$"
        subject: "^https://github\\.com/Ivanhahanov/ctf-school-controller/\\.github/workflows/release\\.yml@refs/.+$"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/clusters/cloud
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
