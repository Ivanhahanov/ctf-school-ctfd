apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# flux-system.yaml (OCI sources + root Kustomization) is applied imperatively by the
# deploy procedure (make/CI) with ${REGISTRY}/${TAG} — not re-rendered by Flux.
resources:
  - ../base               # SAME shared mechanism as kind
  - cluster-config.yaml   # cloud values
  - secrets.yaml          # Flux Kustomization: SOPS-decrypts the ctf-school-secret
                          # AFTER infrastructure (dependsOn) — see secrets/ + README
  - tls.yaml              # Flux Kustomization: Let's Encrypt ACME ClusterIssuers (cloud only)
