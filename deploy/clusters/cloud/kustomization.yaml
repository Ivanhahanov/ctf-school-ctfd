apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-system.yaml      # repo source + root Kustomization (self-managed)
  - ../base               # SAME shared mechanism as kind
  - cluster-config.yaml   # cloud values
  # NOTE: no secrets.yaml here — the `ctf-school-secret` Secret is supplied
  # externally (SOPS / sealed-secrets / external-secrets) in controller-system
  # and ctfd namespaces. See cluster-config.yaml.
