# Decrypts and applies the cloud SOPS secret AFTER `infrastructure` has created
# the ctfd / controller-system namespaces (dependsOn) — same ordering guarantee
# as kind's `dev-secrets`, so no bootstrap race.
#
# `decryption.provider: sops` + `secretRef: sops-age` tells kustomize-controller
# to decrypt any SOPS-encrypted files it renders, using the age private key held
# in the `sops-age` Secret in flux-system. That Secret is supplied out-of-band at
# bootstrap (see deploy/clusters/cloud/README) and is the ONLY place the private
# key lives in-cluster — it is never committed.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/clusters/cloud/secrets
  prune: true
  dependsOn:
    - { name: infrastructure }
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
