# OPTION A (Let's Encrypt via Cloudflare DNS-01): cert-manager issues + auto-renews the
# wildcard cert. issuerRef is ${TLS_ISSUER} (letsencrypt-staging | letsencrypt-prod) from
# cluster-config. No `duration` — LE issues 90-day certs, cert-manager renews.
# Used together with acme-issuers.yaml. For the MANUAL cert option, drop this file from
# the kustomization and supply ctfd-tls yourself (see kustomization.yaml).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ctfd-tls
  namespace: ctfd
spec:
  secretName: ctfd-tls
  privateKey:
    rotationPolicy: Always
  dnsNames:
    - ${CTF_DOMAIN}
    - "*.${CTF_DOMAIN}"
  issuerRef:
    name: ${TLS_ISSUER}
    kind: ClusterIssuer
