# OPTION B (MANUAL cert) — a wildcard cert you obtained out-of-band (certbot --manual
# DNS-01, or a purchased cert). Since the platform runs < 60 days (< a cert's lifetime),
# NO auto-renewal is needed, so cert-manager isn't involved for cloud TLS at all.
