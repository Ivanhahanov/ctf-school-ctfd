# Values for the KIND (local dev) cluster. The ONLY thing that differs from prod
# is this map — the deployment mechanism (clusters/base) is identical. Flux fills
# the ${VAR} placeholders in the manifests from here via postBuild.substituteFrom.
apiVersion: v1
kind: ConfigMap
metadata: { name: cluster-config, namespace: flux-system }
data:
  CTF_DOMAIN: "ctf.school.local"
  CTF_SCHEME: "https"
  CTF_FLAG_FORMAT: "CTF{%s}"
  TLS_ISSUER: "selfsigned"   # local: self-signed wildcard (no Let's Encrypt)
  # Same image NAMES as prod (explabs/ctf-school-*), just kind-loaded locally instead
  # of pulled — so what you see is consistent everywhere. `make images` builds+loads them.
  CONTROLLER_IMAGE: "explabs/ctf-school-controller"
  CTFD_IMAGE: "explabs/ctf-school-ctfd"
  GUARD_IMAGE: "explabs/ctf-school-guard:latest"   # full ref (the controller injects it verbatim)
  IMAGE_TAG: "latest"
