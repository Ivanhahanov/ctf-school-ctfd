# Applies the kind dev secret AFTER `infrastructure` has created the ctfd /
# controller-system namespaces. Being its own Kustomization (with dependsOn) is
# what fixes the bootstrap race: the root Kustomization no longer applies a Secret
# into a namespace that doesn't exist yet, so its apply never fails/aborts.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/clusters/kind/secrets
  prune: true
  dependsOn:
    - { name: infrastructure }
  sourceRef:
    kind: GitRepository
    name: flux-system
