apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-system.yaml      # repo source + root Kustomization (self-managed)
  - ../base               # shared sources + platform Kustomizations (the mechanism)
  - cluster-config.yaml   # THIS cluster's values (the only real divergence)
  - dev-secrets.yaml      # Flux Kustomization that applies the dev secret AFTER
                          # infrastructure (secrets/ dir) — avoids the bootstrap race
