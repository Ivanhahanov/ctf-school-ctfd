apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# NOTE: flux-system.yaml (the OCI sources + root Kustomization) is NOT listed here — it
# carries ${REGISTRY}/${TAG} placeholders and is applied imperatively by `make` (the one
# bootstrap seed), so Flux must not re-render it.
resources:
  - ../base               # shared platform Kustomizations (the mechanism)
  - cluster-config.yaml   # THIS cluster's values (registry/tag/domain/scheme)
  - secrets.yaml          # Flux Kustomization: SOPS-decrypts ctf-school-secret AFTER
                          # infrastructure — SAME mechanism as cloud (one procedure)
  - tls.yaml              # Flux Kustomization: self-signed ctfd-tls (per-cluster)
