# SOPS-decrypts and applies the kind dev secret AFTER `infrastructure` created the
# namespaces (dependsOn) — the IDENTICAL mechanism as clusters/cloud/secrets.yaml, so
# local and prod handle secrets by one procedure. `make` loads the age private key as
# the `sops-age` Secret; kustomize-controller uses it to decrypt.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/clusters/kind/secrets
  prune: true
  dependsOn:
    - { name: infrastructure }
  sourceRef:
    kind: OCIRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
