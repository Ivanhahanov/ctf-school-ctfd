# DEV-ONLY HMAC secret for local kind. Identical mechanism to prod (the manifests
# reference `ctf-school-secret` via secretKeyRef) — only the VALUE is a known dev
# string here. In cloud this Secret is supplied externally (SOPS / sealed-secrets
# / external-secrets) and this directory does NOT exist in the cloud overlay.
