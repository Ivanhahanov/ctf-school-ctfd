# DEV-ONLY HMAC secret for local kind. Identical mechanism to prod (the manifests
# reference `ctf-school-secret` via secretKeyRef) — only the VALUE is a known dev
# string here. In cloud this Secret is supplied externally (SOPS / sealed-secrets
# / external-secrets) and this directory does NOT exist in the cloud overlay.
#
# Applied by the `dev-secrets` Flux Kustomization (dependsOn: infrastructure) so
# the ctfd / controller-system namespaces already exist — no bootstrap race.
# It must live in BOTH namespaces that derive flags: the controller (which injects
# $FLAG) and CTFd (which validates submissions). Same value → flags match.
apiVersion: v1
kind: Secret
metadata:
  name: ctf-school-secret
  namespace: controller-system
type: Opaque
stringData:
  secret: "ctf-school-secret-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: ctf-school-secret
  namespace: ctfd
type: Opaque
stringData:
  secret: "ctf-school-secret-key"
  # Bearer token guarding the anti-cheat /lab-metrics exporter (it exposes client
  # IPs). The VMServiceScrape passes the same value. Dev string here; prod injects.
  metrics_token: "dev-metrics-scrape-token"
