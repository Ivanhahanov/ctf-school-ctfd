# Each project is its own repo → its own Flux GitRepository source (read-only).
# `flux-system` (this ctfd repo) is defined in flux-system.yaml; these two point
# at the sibling repos. Private repos → add `secretRef` + a read-only deploy key.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: controller
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Ivanhahanov/ctf-school-controller
  ref:
    branch: main
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: challenges
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Ivanhahanov/ctf-school-challenges
  ref:
    branch: main
