apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - sources.yaml
  - operators.yaml
# The monitoring HelmRelease reads its values from this ConfigMap, generated
# from the same file `make monitoring` uses — single source of truth.
configMapGenerator:
  - name: monitoring-values
    namespace: monitoring
    files:
      - values.yaml=../apps/monitoring/values.yaml
generatorOptions:
  disableNameSuffixHash: true
