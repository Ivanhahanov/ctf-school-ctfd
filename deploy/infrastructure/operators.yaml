# Platform operators as Flux HelmReleases — Flux installs/upgrades these (no more
# `helm install` in the Makefile).
#
# Versions use major-bounded semver ranges so Flux tracks the LATEST STABLE
# release automatically (re-resolved on each `interval`). For production you may
# prefer exact pins + Renovate; bounding the major avoids breaking upgrades.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: ">=1.17.0 <2.0.0"
      sourceRef: { kind: HelmRepository, name: jetstack, namespace: flux-system }
  install: { createNamespace: true, crds: CreateReplace }
  upgrade: { crds: CreateReplace }
  values:
    crds:
      enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  interval: 30m
  chart:
    spec:
      chart: gateway-helm
      version: ">=1.4.0 <2.0.0"
      sourceRef: { kind: HelmRepository, name: envoy-gateway, namespace: flux-system }
  install: { createNamespace: true }
---
# CRDs first, then the operator (chart split, as upstream recommends).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator-crds
  namespace: mariadb-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: mariadb-operator-crds
      version: ">=26.0.0 <27.0.0"
      sourceRef: { kind: HelmRepository, name: mariadb-operator, namespace: flux-system }
  install: { createNamespace: true }
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb-operator
  namespace: mariadb-operator
spec:
  interval: 30m
  dependsOn:
    - { name: mariadb-operator-crds }
  chart:
    spec:
      chart: mariadb-operator
      version: ">=26.0.0 <27.0.0"
      sourceRef: { kind: HelmRepository, name: mariadb-operator, namespace: flux-system }
  values:
    crds:
      enabled: false
---
# Monitoring stack. Values come from a ConfigMap the infrastructure Kustomization
# generates from deploy/apps/monitoring/values.yaml (single source of truth).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 30m
  releaseName: vm
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: ">=0.58.0 <1.0.0"
      sourceRef: { kind: HelmRepository, name: victoria-metrics, namespace: flux-system }
  install: { createNamespace: true }
  valuesFrom:
    - kind: ConfigMap
      name: monitoring-values
      valuesKey: values.yaml
