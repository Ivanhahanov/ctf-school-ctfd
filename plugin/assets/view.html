{% extends "challenge.html" %}

{% block description %}
<div id="lab-card-{{ challenge.id }}" class="rounded-3 p-3 mb-3 border"
     style="background:var(--bs-tertiary-bg,#f1f3f5)">

  <div class="d-flex align-items-center justify-content-between mb-2">
    <span class="fw-semibold small text-uppercase text-muted" style="letter-spacing:.07em">
      <i class="fas fa-display me-1 opacity-75"></i>Lab Environment
    </span>
    <span id="lab-badge-{{ challenge.id }}" class="badge rounded-pill" style="display:none"></span>
  </div>

  <!-- transient state while the very first status check is in flight.
       NB: uses inline flex (not the .d-flex class) so that hiding it via an
       inline `display:none` actually works — .d-flex is `display:flex!important`
       and an inline style cannot override an !important class. -->
  <div id="lab-checking-{{ challenge.id }}" class="small text-muted py-1"
       style="display:flex;align-items:center;gap:.5rem">
    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
    <span id="lab-checking-text-{{ challenge.id }}">Checking lab status…</span>
  </div>

  <!-- idle: lab has never been started -->
  <div id="lab-idle-{{ challenge.id }}" class="small text-muted mb-2" style="display:none">
    Spin up an isolated desktop workspace to solve this challenge.
  </div>

  <!-- provisioning: a single status line (the controller's current message) -->
  <div id="lab-info-{{ challenge.id }}" class="small text-muted py-1" style="display:none">
    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
    <span id="lab-info-text-{{ challenge.id }}"></span>
  </div>

  <!-- running: the workspace is the single entry point -->
  <div id="lab-workspace-{{ challenge.id }}" class="mb-2" style="display:none">
    <a id="lab-ws-link-{{ challenge.id }}" href="#" target="_blank" rel="noopener"
       class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
      <i class="fas fa-display"></i><span>Open Desktop Workspace</span>
    </a>
    <div class="small text-muted mt-2">
      <i class="fas fa-lock me-1 opacity-75"></i>All challenge services are reachable only from inside the workspace.
    </div>
  </div>

  <!-- controls -->
  <div class="d-flex gap-2 flex-wrap">
    <button class="btn btn-success btn-sm px-3" id="lab-btn-start-{{ challenge.id }}"
            onclick="labAction({{ challenge.id }}, 'start')" style="display:none">
      <i class="fas fa-play me-1"></i>Start Lab
    </button>
    <button class="btn btn-outline-danger btn-sm px-3" id="lab-btn-stop-{{ challenge.id }}"
            onclick="labAction({{ challenge.id }}, 'stop')" style="display:none">
      <i class="fas fa-stop me-1"></i>Stop
    </button>
    <button class="btn btn-outline-secondary btn-sm px-3" id="lab-btn-reload-{{ challenge.id }}"
            onclick="labAction({{ challenge.id }}, 'reload')" style="display:none">
      <i class="fas fa-rotate me-1"></i>Restart
    </button>
  </div>

  <div id="lab-msg-{{ challenge.id }}" class="mt-2 alert py-1 px-2 small mb-0" style="display:none"></div>
</div>

<hr class="my-2">
<span class="challenge-desc">{{ challenge.html }}</span>
{% endblock %}
